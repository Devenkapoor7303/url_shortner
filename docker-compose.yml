version: '3.8'

services:
  # --- KRAF'T CONTROLLER LAYER (3 Nodes for Quorum) ---
  controller-1:
    image: apache/kafka:3.7.0
    container_name: controller-1
    environment:
      KAFKA_NODE_ID: 1
      # every node in kafka cluster has a unique node id this node id is showed in kafka describe command
      KAFKA_PROCESS_ROLES: controller
      # defines the role of particular node
      KAFKA_LISTENERS: CONTROLLER://controller-1:9093
      # opening a socket connection on active controller through which broker can ask cluster metadata
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # broker will connect to controller using listener name only
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      # controller to controller communication happening over plain text
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      # listing all voters of the quorum if leader controller goes down all controller send heartbeat to each other
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # cluster id common among kafka cluster as there can be multiple clusters

  controller-2:
    image: apache/kafka:3.7.0
    container_name: controller-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://controller-2:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  controller-3:
    image: apache/kafka:3.7.0
    container_name: controller-3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://controller-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  # --- KAFKA BROKER LAYER (2 Data Processing Nodes) ---
  broker-1:
    image: apache/kafka:3.7.0
    container_name: broker-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 4
      # defining unique node in kafka cluster
      KAFKA_PROCESS_ROLES: broker
      # defining the role of broker in kafka cluster
      KAFKA_LISTENERS: PLAINTEXT://:29092,EXTERNAL://:9092
      # these are list of ports and ip open on broker either consumer/producer will connect through EXTERNAL
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-1:29092,EXTERNAL://localhost:9092
      # this is the list of metadata stored on the controller given by broker
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      # this defines how broker and controller or broker and producer will talk like over ssl or plaintext
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # used by broker to connect to active controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      # both controller and broker this data
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # unique cluster id
      KAFKA_NUM_PARTITIONS: 3
      # Every new topic gets 3 partitions automatically
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      # every partition has a replication factor of 2
    depends_on:
      - controller-1
      - controller-2
      - controller-3

  broker-2:
    image: apache/kafka:3.7.0
    container_name: broker-2
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: PLAINTEXT://:29092,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-2:29092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
    depends_on:
      - controller-1
      - controller-2
      - controller-3